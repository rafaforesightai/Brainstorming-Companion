<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brainstorm Companion</title>
  <style>
    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #1a1d2e;
      --bg-tertiary: #252840;
      --accent-primary: #6c63ff;
      --accent-secondary: #ff6584;
      --accent-tertiary: #43e97b;
      --text-primary: #e8eaf6;
      --text-secondary: #9fa8da;
      --text-muted: #5c6bc0;
      --border-color: #2d3561;
      --shadow: 0 4px 20px rgba(0,0,0,0.4);
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .status {
      font-size: 0.75rem;
      color: var(--accent-tertiary);
      background: rgba(67, 233, 123, 0.1);
      border: 1px solid rgba(67, 233, 123, 0.2);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
    }

    .main {
      flex: 1;
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }

    .indicator-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 0.75rem 2rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--text-secondary);
      z-index: 100;
    }

    .selected-text {
      color: var(--accent-tertiary);
      font-weight: 600;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .options {
      display: grid;
      gap: 0.75rem;
    }

    .options.grid-2 { grid-template-columns: repeat(2, 1fr); }
    .options.grid-3 { grid-template-columns: repeat(3, 1fr); }

    .option {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .option:hover {
      border-color: var(--accent-primary);
      background: rgba(108, 99, 255, 0.05);
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }

    .option.selected {
      border-color: var(--accent-primary);
      background: rgba(108, 99, 255, 0.1);
    }

    .option.selected::after {
      content: '✓';
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      color: var(--accent-primary);
      font-size: 1rem;
      font-weight: 700;
    }

    .option .content p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .card:hover {
      border-color: var(--accent-primary);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card.selected {
      border-color: var(--accent-primary);
      background: rgba(108, 99, 255, 0.1);
    }

    .card-header {
      padding: 1rem;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }

    .card-body {
      padding: 1rem;
    }

    .card-body p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0;
    }

    .tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
    }

    .tag-purple { background: rgba(108, 99, 255, 0.2); color: #a89cff; }
    .tag-pink { background: rgba(255, 101, 132, 0.2); color: #ff8fa8; }
    .tag-green { background: rgba(67, 233, 123, 0.2); color: #6effa0; }
    .tag-blue { background: rgba(64, 196, 255, 0.2); color: #7dd8ff; }

    .progress-bar {
      background: var(--bg-tertiary);
      border-radius: 4px;
      height: 6px;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .info-box {
      background: rgba(108, 99, 255, 0.08);
      border: 1px solid rgba(108, 99, 255, 0.2);
      border-radius: var(--radius);
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .info-box p {
      margin: 0;
      font-size: 0.9rem;
    }

    ul, ol {
      padding-left: 1.5rem;
      color: var(--text-secondary);
      line-height: 1.8;
    }

    li { margin-bottom: 0.25rem; }

    pre { background: var(--bg-tertiary); border-radius: 8px; padding: 1rem; overflow-x: auto; margin: 1rem 0; }
    code { font-family: 'SF Mono', Menlo, monospace; font-size: 0.9em; }
    pre code { display: block; }
    .mermaid { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Brainstorm Companion</h1>
    <div class="status">Connected</div>
  </div>
  <div class="main">
    <div id="claude-content">
      <!-- CONTENT -->
    </div>
  </div>
  <div class="indicator-bar">
    <span id="indicator-text">Click an option above, then return to the terminal</span>
  </div>
</body>
</html>
